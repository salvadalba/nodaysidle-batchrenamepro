<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Stacked file pages (back) -->
  <rect x="140" y="80" width="260" height="320" rx="16" fill="#334155" opacity="0.5"/>
  <rect x="120" y="100" width="260" height="320" rx="16" fill="#475569" opacity="0.6"/>
  <!-- Main file page -->
  <rect x="100" y="120" width="260" height="320" rx="16" fill="#f1f5f9"/>
  <!-- File lines -->
  <rect x="140" y="180" width="180" height="8" rx="4" fill="#94a3b8"/>
  <rect x="140" y="210" width="140" height="8" rx="4" fill="#cbd5e1"/>
  <rect x="140" y="240" width="160" height="8" rx="4" fill="#cbd5e1"/>
  <!-- Rename arrow -->
  <g transform="translate(300, 300)">
    <circle cx="0" cy="0" r="80" fill="url(#accent)"/>
    <!-- Pencil/edit icon -->
    <path d="M-20 20 L15 -15 L25 -5 L-10 30 L-25 33 Z" fill="white" stroke="white" stroke-width="2" stroke-linejoin="round"/>
    <path d="M15 -15 L25 -25 L35 -15 L25 -5 Z" fill="white" opacity="0.8"/>
    <!-- Arrow swoosh -->
    <path d="M-35 -10 Q-15 -40 15 -35" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <path d="M10 -42 L18 -33 L7 -30" fill="white"/>
  </g>
</svg>
